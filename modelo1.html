<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ver en AR</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      font-family: system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    model-viewer {
      width: 100vw;
      height: 100dvh;
      background-color: transparent;
      --poster-color: transparent;
    }

    /* Botón AR personalizado */
    #ar-button {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      color: #111;
      border: none;
      border-radius: 50px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      white-space: nowrap;
      z-index: 10;
    }
    #ar-button:active {
      transform: translateX(-50%) scale(0.97);
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }
    #ar-button svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    /* Ocultar el botón si AR no está disponible */
    #ar-button.hidden {
      display: none;
    }

    /* Mensaje de no soporte */
    #no-ar-msg {
      display: none;
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.1);
      color: #aaa;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      padding: 12px 24px;
      font-size: 14px;
      white-space: nowrap;
    }
    #no-ar-msg.visible {
      display: block;
    }

    /* Loading overlay */
    #loading-overlay {
      position: absolute;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 20;
      transition: opacity 0.4s ease;
    }
    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }

    /* Error overlay */
    #error-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: #0a0a0a;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 25;
      padding: 32px;
      text-align: center;
    }
    #error-overlay.visible {
      display: flex;
    }
    .error-icon { font-size: 48px; }
    .error-title { color: #fff; font-size: 18px; font-weight: 600; }
    .error-desc { color: #888; font-size: 14px; line-height: 1.5; max-width: 280px; }
    .retry-btn {
      margin-top: 8px;
      background: #fff;
      color: #111;
      border: none;
      border-radius: 50px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <p class="loading-text">Cargando modelo…</p>
  </div>

  <!-- Error -->
  <div id="error-overlay">
    <div class="error-icon">⚠️</div>
    <p class="error-title">No se pudo cargar el modelo</p>
    <p class="error-desc" id="error-desc">Verifica tu conexión o que el archivo .glb exista.</p>
    <button class="retry-btn" onclick="location.reload()">Reintentar</button>
  </div>

  <model-viewer
    id="viewer"
    src="https://jorge-coder2005.github.io/modelos-ar/modelo4.glb"
    ios-src="modelo4.usdz"
    ar
    ar-modes="scene-viewer webxr quick-look"
    ar-scale="auto"
    ar-placement="floor"
    camera-controls
    auto-rotate
    auto-rotate-delay="500"
    rotation-per-second="20deg"
    shadow-intensity="1"
    shadow-softness="0.8"
    exposure="1"
    loading="eager"
    reveal="auto"
    touch-action="pan-y">

    <!-- Botón AR custom (slot oficial) -->
    <button slot="ar-button" id="ar-button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
      Ver en mi espacio
    </button>

  </model-viewer>

  <!-- Mensaje si AR no está disponible (fuera del viewer) -->
  <div id="no-ar-msg">📵 AR no disponible en este dispositivo</div>

  <script>
    const viewer = document.getElementById('viewer');
    const loadingOverlay = document.getElementById('loading-overlay');
    const errorOverlay = document.getElementById('error-overlay');
    const errorDesc = document.getElementById('error-desc');
    const noArMsg = document.getElementById('no-ar-msg');

    // Ocultar loading cuando el modelo esté listo
    viewer.addEventListener('load', () => {
      loadingOverlay.classList.add('hidden');
    });

    // Error al cargar el modelo
    viewer.addEventListener('error', (e) => {
      loadingOverlay.classList.add('hidden');
      errorDesc.textContent = e.detail?.sourceError?.message
        || 'Verifica que el archivo modelo1.glb exista en el servidor.';
      errorOverlay.classList.add('visible');
    });

    // Detectar si AR está disponible después de cargar
    viewer.addEventListener('load', () => {
      // model-viewer expone .canActivateAR tras cargar
      if (!viewer.canActivateAR) {
        noArMsg.classList.add('visible');
      }
    });

    // Eventos del ciclo AR para debug en consola
    viewer.addEventListener('ar-status', (e) => {
      console.log('[AR] status:', e.detail.status);
      if (e.detail.status === 'failed') {
        console.warn('[AR] Falló el modo AR. Intenta con otro dispositivo o navegador.');
      }
    });

    viewer.addEventListener('ar-tracking', (e) => {
      console.log('[AR] tracking:', e.detail.status);
    });
  </script>
</body>
</html>
