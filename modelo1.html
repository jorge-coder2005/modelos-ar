<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ver en AR</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      font-family: system-ui, sans-serif;
      height: 100dvh;
      overflow: hidden;
    }
    model-viewer {
      width: 100vw;
      height: 100dvh;
      background-color: transparent;
      --poster-color: transparent;
    }
    #ar-button {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      color: #111;
      border: none;
      border-radius: 50px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      white-space: nowrap;
      z-index: 10;
    }
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 20;
      transition: opacity 0.4s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: rgba(255,255,255,0.5); font-size: 14px; }
    #no-ar-msg {
      display: none;
      position: fixed;
      bottom: 36px; left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.08);
      color: #888;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50px;
      padding: 12px 24px;
      font-size: 14px;
      white-space: nowrap;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p class="loading-text">Cargando modelo…</p>
  </div>

  <model-viewer
    id="viewer"
    src="https://jorge-coder2005.github.io/modelos-ar/modelo4.glb"
    camera-controls
    auto-rotate
    auto-rotate-delay="500"
    shadow-intensity="1"
    loading="eager"
    reveal="auto"
    touch-action="pan-y">
  </model-viewer>

  <button id="ar-button">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/>
      <path d="M2 17l10 5 10-5"/>
      <path d="M2 12l10 5 10-5"/>
    </svg>
    Ver en mi espacio
  </button>

  <div id="no-ar-msg">📵 AR no disponible en este dispositivo</div>

  <script>
    const viewer   = document.getElementById('viewer');
    const arBtn    = document.getElementById('ar-button');
    const loading  = document.getElementById('loading-overlay');
    const noArMsg  = document.getElementById('no-ar-msg');

    const MODEL_URL = 'https://jorge-coder2005.github.io/modelos-ar/modelo1.glb';

    // Detectar plataforma
    const isIOS     = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isAndroid = /android/i.test(navigator.userAgent);

    viewer.addEventListener('load', () => {
      loading.classList.add('hidden');
    });

    function launchSceneViewer() {
      // Intent directo a Scene Viewer — más confiable que model-viewer en Android
      const encodedModel = encodeURIComponent(MODEL_URL);
      const encodedTitle = encodeURIComponent('Modelo 3D');
      const intentUrl =
        `intent://arvr.google.com/scene-viewer/1.0?file=${encodedModel}` +
        `&mode=ar_preferred` +
        `&title=${encodedTitle}` +
        `#Intent;scheme=https;package=com.google.ar.core;action=android.intent.action.VIEW;S.browser_fallback_url=${encodedModel};end;`;

      window.location = intentUrl;
    }

    function launchQuickLook() {
      // iOS Quick Look necesita .usdz — si no tienes, abre el .glb en Safari como fallback
      const a = document.createElement('a');
      a.setAttribute('rel', 'ar');
      a.setAttribute('href', MODEL_URL.replace('.glb', '.usdz'));
      a.appendChild(document.createElement('img'));
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    arBtn.addEventListener('click', () => {
      if (isAndroid) {
        launchSceneViewer();
      } else if (isIOS) {
        launchQuickLook();
      } else {
        // Desktop: activar WebXR vía model-viewer
        viewer.activateAR();
      }
    });

    // Ocultar botón AR si no hay soporte
    viewer.addEventListener('load', () => {
      const hasAR = isAndroid || isIOS || viewer.canActivateAR;
      if (!hasAR) {
        arBtn.style.display = 'none';
        noArMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
