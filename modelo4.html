<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>
  <style>
    body{
      margin:0;
      background:#000;
    }
    model-viewer{
      width:100vw;
      height:100vh;
    }
  </style>
</head>
<body>
<model-viewer
  src="modelo4.glb"
  ar
  ar-modes="scene-viewer webxr quick-look"
  camera-controls
  auto-rotate
  shadow-intensity="1">
  <button slot="ar-button">
    Ver en AR
  </button>
</model-viewer>
</body>
</html>
